<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nebula — A premium team collaboration and workflow management tool. Organize tasks, communicate, and streamline your team's workflow.">
  <title>Nebula — Team Collaboration & Workflow</title>
  
  <!-- Adoption of Google Services: Google Fonts & Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/workflow.css">
  <link rel="stylesheet" href="css/team.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/activity.css">
</head>
<body>
  <!-- Accessibility: Skip Link -->
  <a href="#page-dashboard" class="skip-link">Skip to main content</a>

  <!-- Background glow effects -->
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <div class="app-layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="app-sidebar" role="navigation" aria-label="Main Navigation">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon" aria-hidden="true">N</div>
        <span class="sidebar-brand-name">Nebula</span>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a class="sidebar-link active" data-page="dashboard" href="#dashboard" id="nav-dashboard">
          <span class="material-symbols-rounded sidebar-link-icon">grid_view</span>
          <span class="sidebar-link-label">Dashboard</span>
        </a>
        <a class="sidebar-link" data-page="board" href="#board" id="nav-board">
          <span class="material-symbols-rounded sidebar-link-icon">splitscreen</span>
          <span class="sidebar-link-label">Task Board</span>
        </a>
        <a class="sidebar-link" data-page="chat" href="#chat" id="nav-chat">
          <span class="material-symbols-rounded sidebar-link-icon">forum</span>
          <span class="sidebar-link-label">Team Chat</span>
          <span class="sidebar-link-badge" id="chat-badge" aria-label="9 unread messages">9</span>
        </a>
        <a class="sidebar-link" data-page="workflows" href="#workflows" id="nav-workflows">
          <span class="material-symbols-rounded sidebar-link-icon">account_tree</span>
          <span class="sidebar-link-label">Workflows</span>
        </a>

        <div class="sidebar-section-label">Team</div>
        <a class="sidebar-link" data-page="team" href="#team" id="nav-team">
          <span class="material-symbols-rounded sidebar-link-icon">group</span>
          <span class="sidebar-link-label">Team</span>
        </a>
        <a class="sidebar-link" data-page="activity" href="#activity" id="nav-activity">
          <span class="material-symbols-rounded sidebar-link-icon">history</span>
          <span class="sidebar-link-label">Activity</span>
          <span class="sidebar-link-badge" aria-label="3 new activities">3</span>
        </a>
      </nav>

      <div class="sidebar-user">
        <div class="sidebar-user-avatar" aria-hidden="true">AM</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Alex Morgan</div>
          <div class="sidebar-user-role">Product Manager</div>
        </div>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="app-main" id="main-content" role="main">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <h1 class="header-page-title" id="page-title" tabindex="-1">Dashboard</h1>
        </div>
        <div class="header-right">
          <div class="header-search">
            <span class="material-symbols-rounded header-search-icon">search</span>
            <input type="text" id="global-search" placeholder="Search anything..." aria-label="Global search">
          </div>
          <button class="header-icon-btn" id="btn-notifications" title="Notifications" aria-label="Notifications">
            <span class="material-symbols-rounded">notifications</span>
            <span class="notification-dot" aria-hidden="true"></span>
          </button>
          <button class="header-icon-btn" id="btn-reset" title="Reset demo data" aria-label="Reset application data">
            <span class="material-symbols-rounded">refresh</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="app-content">

        <!-- Dashboard Page -->
        <section class="page-section active" id="page-dashboard" aria-labelledby="page-title">
          <div id="dashboard-content"></div>
        </section>

        <!-- Board Page -->
        <section class="page-section" id="page-board" aria-label="Task Board">
          <div class="board-header">
            <div class="board-filters" id="board-filters" role="group" aria-label="Task priority filters">
              <button class="board-filter-btn active" data-filter="all">All</button>
              <button class="board-filter-btn" data-filter="critical">Critical</button>
              <button class="board-filter-btn" data-filter="high">High</button>
              <button class="board-filter-btn" data-filter="medium">Medium</button>
              <button class="board-filter-btn" data-filter="low">Low</button>
            </div>
            <button class="btn btn-primary" id="btn-new-task">+ New Task</button>
          </div>
          <div class="board-columns" id="board-columns"></div>
          <div id="task-modal" role="dialog" aria-modal="true"></div>
        </section>

        <!-- Chat Page -->
        <section class="page-section" id="page-chat" aria-label="Team Chat">
          <div class="chat-layout" style="height:calc(100vh - var(--header-height) - 48px);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-subtle)">
            <div class="chat-sidebar">
              <div class="chat-sidebar-header">
                <div class="chat-sidebar-title">Channels</div>
              </div>
              <div class="chat-channel-list" id="chat-channel-list" role="tablist" aria-label="Chat channels"></div>
            </div>
            <div class="chat-main">
              <div class="chat-header">
                <div class="chat-header-info">
                  <span class="chat-header-channel" id="chat-header-channel">#general</span>
                  <span class="chat-header-desc" id="chat-header-desc">General team discussions</span>
                </div>
              </div>
              <div class="chat-messages" id="chat-messages" role="log" aria-live="polite"></div>
              <div class="chat-input-area">
                <div class="chat-input-wrapper">
                  <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1" aria-label="Message input"></textarea>
                  <button class="chat-send-btn" id="chat-send-btn" title="Send message" aria-label="Send message">
                    <span class="material-symbols-rounded">send</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Workflows Page -->
        <section class="page-section" id="page-workflows" aria-label="Workflows">
          <div id="workflow-content"></div>
        </section>

        <!-- Team Page -->
        <section class="page-section" id="page-team" aria-label="Team Directory">
          <div id="team-content"></div>
        </section>

        <!-- Activity Page -->
        <section class="page-section" id="page-activity" aria-label="Activity Feed">
          <div id="activity-content"></div>
        </section>

      </div>
    </main>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Scripts: High-scoring Module Pattern -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
